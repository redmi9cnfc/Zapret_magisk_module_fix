<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPset - Zapret</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/beercss@3.11.20/dist/cdn/beer.min.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.11.20/dist/cdn/beer.min.js"></script>
<script src="/i18n.js"></script>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Google Sans", sans-serif;
    background-color: #121212;
    color: #fff;
    display: flex;
    flex-direction: column;
    height: 100%;
}
main {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}
h5 {
    text-align: center;
    margin-bottom: 10px;
}
.field.textarea.round.border.extra {
    background-color: #1e1e1e;
    border-radius: 12px;
    padding: 5px;
}
textarea {
    width: 100%;
    height: 250px;
    background: #1e1e1e;
    color: #fff;
    border: none;
    resize: none;
    padding: 10px;
    border-radius: 8px;
}
button {
    margin: 10px 5px 0 0;
    padding: 10px 15px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    color: #fff;
}
button.save { background-color: #1e88e5; }
button.undo { background-color: #757575; }
button.restart { background-color: #f57c00; }
nav.bottom-nav {
    display: flex;
    justify-content: space-around;
    background: #1e1e1e;
    padding: 10px 0;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.5);
}
nav.bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 0.85em;
    color: #aaa;
    text-decoration: none;
}
nav.bottom-nav a.active i,
nav.bottom-nav a.active span { color: #1e88e5; }
</style>
<script type="module">
import { exec, toast } from '/kernelsu.js';

const configtext = document.getElementById('configtext');

// загрузка ipset
function undo() {
    exec("cat /data/adb/zapret/ipset.txt").then(({ stdout }) => {
        configtext.value = stdout;
    });
}
window.undo = undo;
undo();

// сохранение ipset
function save(config) {
    config = config
        .split('\n')
        .map(line => line
            .replace(/ {2,}/g, ' ')
            .replace(/^ /, '')
            .replace(/ $/, '')
        )
        .join('\n');
    configtext.value = config;
    exec(`echo "${config}" > /data/adb/zapret/ipset.txt`).then(() => {
        toast(t('saved'));
    });
}
window.save = save;

// перезапуск zapret
function restart() {
    exec("zapret stop").then(({ stdout }) => toast(stdout));
    exec("zapret start").then(({ stdout }) => toast(stdout));
}
window.restart = restart;
</script>
</head>

<body>
<main>
    <h5>IP-Адреса Zapret</h5>
    <div class="field textarea round border extra">
        <textarea id="configtext"></textarea>
    </div>
    <div>
        <button class="save" onclick="save(configtext.value)"><i>save</i> Сохранить</button>
        <button class="undo" onclick="undo()"><i>undo</i> Отменить</button>
        <button class="restart" onclick="restart()"><i>replay</i> Перезапустить</button>
    </div>
</main>

<nav class="bottom-nav">
    <a href="index.html"><i>info</i><span>Инфо</span></a>
    <a href="domains.html"><i>domain</i><span>Домены</span></a>
    <a href="config.html"><i>build</i><span>Конфиг</span></a>
    <a class="active" href="ipset.html"><i>lan</i><span>IP</span></a>
    <a href="check.html"><i>check</i><span>Проверка</span></a>
</nav>
</body>

</html>
